name: Build Source For Release
on:
    release:
        types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node

        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install GTK/WebKit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Go Dependencies
        run: go mod download

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Build Linux Binary
        run: go build -o dashboard_linux .

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: dashboard_linux
          path: dashboard_linux

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node

        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install WebKit deps
        run: brew install pkg-config gtk+3 webkit2gtk

      - name: Install Go Dependencies
        run: go mod download

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Build Mac Binary
        run: go build -o dashboard_mac .

      - name: Upload Mac Binary
        uses: actions/upload-artifact@v4
        with:
          name: dashboard_mac
          path: dashboard_mac

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node

        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Go Dependencies
        run: go mod download

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Generate versioninfo.json
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          BUILD=${{ github.run_number }}
          cat > versioninfo.json << EOF
          {
            "FixedFileInfo": {
              "FileVersion": { "Major": ${MAJOR}, "Minor": ${MINOR}, "Patch": ${PATCH}, "Build": ${BUILD} },
              "ProductVersion": { "Major": ${MAJOR}, "Minor": ${MINOR}, "Patch": ${PATCH}, "Build": ${BUILD} },
              "FileFlagsMask": "3f",
              "FileFlags": "00",
              "FileOS": "040004",
              "FileType": "01",
              "FileSubType": "00"
            },
            "StringFileInfo": {
              "CompanyName": "Serge Storm Team",
              "FileDescription": "Dashboard used for viewing the data live from the Zephyr Probe",
              "FileVersion": "${VERSION}.${BUILD}",
              "InternalName": "myapp",
              "LegalCopyright": "Copyright © $(date +%Y) Serge Storm Team",
              "OriginalFilename": "myapp.exe",
              "ProductName": "Zephyr Dashboard",
              "ProductVersion": "${VERSION}"
            },
            "VarFileInfo": {
              "Translation": { "LangID": "0409", "CharsetID": "04B0" }
            },
            "IconPath": "public/icon.ico"
          }
          EOF
      - name: Generate resource file
        run: goversioninfo -icon=public/icon.ico

      - name: Build Windows Binary
        run: go build -o dashboard_windows.exe .

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: dashboard_windows
          path: dashboard_windows.exe

  release:
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dashboard_linux/dashboard_linux
            dashboard_mac/dashboard_mac
            dashboard_windows/dashboard_windows.exe